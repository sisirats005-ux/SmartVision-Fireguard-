<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Fire & Smoke — Sign Up</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500..800&family=Inter:wght@400..800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="static/css/index.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'bg-0': '#05070c',
            'bg-1': '#070a12',
            'cyan': '#28f7ff',
            'cyan-2': '#00c8ff',
          },
          fontFamily: {
            orbitron: ['Orbitron', 'sans-serif'],
            sans: ['Inter', 'ui-sans-serif', 'system-ui'],
          }
        }
      }
    }
  </script>
</head>

<body class="min-h-screen text-white overflow-x-hidden">
  <div class="bg-grid fixed inset-0 pointer-events-none -z-10"></div>

  <main class="grid place-items-center min-h-screen py-8">
    <section
      class="glass-panel glow-edge relative w-[min(500px,90%)] p-8 border border-[rgba(160,210,255,0.14)] rounded-2xl shadow-[0_18px_60px_rgba(0,0,0,0.55)]">

      <header class="mb-6">
        <div class="font-mono text-xs uppercase tracking-[0.18em] text-[rgba(231,240,255,0.7)] mb-2">User</div>
        <div class="font-orbitron text-3xl md:text-4xl font-bold">SmartVision FireGuard</div>
      </header>

      <!-- IMPORTANT: data-page="signup" -->
      <form data-page="signup" class="grid gap-4">
        <div>
          <label class="font-mono text-xs uppercase tracking-[0.18em] text-[rgba(231,240,255,0.7)] block mb-2">Full
            Name</label>
          <input
            class="w-full px-3 py-[11px] rounded-xl border border-[rgba(160,210,255,0.16)] bg-[rgba(5,8,14,0.55)] text-white outline-none transition-all focus:border-[rgba(40,247,255,0.44)] focus:shadow-[0_0_0_1px_rgba(40,247,255,0.22),0_0_0_4px_rgba(40,247,255,0.10)]"
            type="text" placeholder="John Doe" required />
        </div>

        <div>
          <label
            class="font-mono text-xs uppercase tracking-[0.18em] text-[rgba(231,240,255,0.7)] block mb-2">Email</label>
          <input
            class="w-full px-3 py-[11px] rounded-xl border border-[rgba(160,210,255,0.16)] bg-[rgba(5,8,14,0.55)] text-white outline-none transition-all focus:border-[rgba(40,247,255,0.44)] focus:shadow-[0_0_0_1px_rgba(40,247,255,0.22),0_0_0_4px_rgba(40,247,255,0.10)]"
            type="email" placeholder="name@lab.example" required />
        </div>

        <div>
          <label
            class="font-mono text-xs uppercase tracking-[0.18em] text-[rgba(231,240,255,0.7)] block mb-2">Password</label>
          <input
            class="w-full px-3 py-[11px] rounded-xl border border-[rgba(160,210,255,0.16)] bg-[rgba(5,8,14,0.55)] text-white outline-none transition-all focus:border-[rgba(40,247,255,0.44)] focus:shadow-[0_0_0_1px_rgba(40,247,255,0.22),0_0_0_4px_rgba(40,247,255,0.10)]"
            type="password" placeholder="••••••••" required />
        </div>

        <div>
          <label class="font-mono text-xs uppercase tracking-[0.18em] text-[rgba(231,240,255,0.7)] block mb-2">Confirm
            Password</label>
          <input
            class="w-full px-3 py-[11px] rounded-xl border border-[rgba(160,210,255,0.16)] bg-[rgba(5,8,14,0.55)] text-white outline-none transition-all focus:border-[rgba(40,247,255,0.44)] focus:shadow-[0_0_0_1px_rgba(40,247,255,0.22),0_0_0_4px_rgba(40,247,255,0.10)]"
            type="password" placeholder="••••••••" required />
        </div>

        <button
          class="w-full px-3.5 py-2.5 mt-2 rounded-xl border border-[rgba(40,247,255,0.22)] bg-gradient-to-b from-[rgba(40,247,255,0.14)] to-[rgba(40,247,255,0.06)] font-semibold transition-all duration-150 hover:border-[rgba(40,247,255,0.45)] hover:-translate-y-px"
          type="submit">
          Create Account
        </button>

        <div class="text-center mt-2">
          <span class="text-[rgba(231,240,255,0.6)] text-sm">Already have an account?</span>
          <a href="{{ url_for('index') }}"
            class="text-cyan hover:text-cyan-2 font-semibold text-sm ml-1 transition-colors">
            Sign In
          </a>
        </div>
      </form>

    </section>
  </main>

  <script src="static/js/script.js"></script>
</body>

</html>
